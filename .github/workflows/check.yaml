name: Check
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - name: Install dependencies
        run: mise exec -- bun install --frozen-lockfile
      - name: Run check
        run: mise exec -- bun run check
